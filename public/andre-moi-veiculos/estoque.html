<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b0b0c">
  <title>Estoque | André Moi Veículos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--black:#0b0b0c;--dark:#151517;--red:#e31f2b;--yellow:#ffc21c;--paper:#f3f0e9}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:#151517;font-family:"DM Sans",sans-serif}a{text-decoration:none;color:inherit}button{font:inherit}img{display:block;width:100%}.top{min-height:330px;padding:30px 5vw 65px;color:#fff;background:linear-gradient(110deg,rgba(8,8,9,.97),rgba(8,8,9,.65)),url("assets/nivus.jpg") center 55%/cover}.nav{display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:13px;font-family:Manrope;font-weight:800}.brand img{width:58px;height:58px;border-radius:50%;object-fit:cover}.back{border:1px solid #ffffff66;padding:14px 18px;font-size:12px;font-weight:800;text-transform:uppercase}.intro{margin-top:56px;max-width:900px}.kicker{color:var(--yellow);font-size:11px;font-weight:800;letter-spacing:.2em;text-transform:uppercase}.intro h1{font-family:Manrope;font-size:clamp(58px,8vw,105px);line-height:.86;letter-spacing:-.06em;text-transform:uppercase;margin:15px 0}.intro h1 span{color:var(--red)}.intro p{color:#ccc;line-height:1.7}.catalog{padding:65px 5vw 100px}.head{display:flex;justify-content:space-between;align-items:end;gap:25px;margin-bottom:32px}.head h2{font-family:Manrope;font-size:42px;text-transform:uppercase;margin:0}.head p{color:#6b6762;font-size:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.car{padding:0;text-align:left;border:1px solid #ddd7ce;background:#fff;cursor:pointer;transition:.25s}.car:hover{transform:translateY(-6px);box-shadow:0 18px 42px #07152522}.photo{display:block;aspect-ratio:4/3;overflow:hidden;position:relative}.photo img{height:100%;object-fit:cover}.tag{position:absolute;left:13px;top:13px;background:var(--red);color:#fff;padding:7px 10px;font-size:9px;font-weight:800;text-transform:uppercase}.copy{display:block;padding:21px}.type{color:var(--red);font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase}.copy h3{font-family:Manrope;font-size:27px;margin:8px 0 13px}.facts{display:flex;gap:12px;flex-wrap:wrap;padding-top:13px;border-top:1px solid #ebe5dc;color:#6e6963;font-size:11px}.price{font-family:Manrope;font-size:24px;font-weight:800;color:#b70d18;margin-top:18px}.more{display:block;margin-top:15px;font-size:10px;font-weight:800;text-transform:uppercase}.modal{position:fixed;inset:0;background:#050505d9;display:none;align-items:center;justify-content:center;padding:22px;z-index:20}.modal.open{display:flex}.panel{position:relative;width:min(1000px,100%);max-height:92vh;overflow:auto;background:#fff;display:grid;grid-template-columns:1.1fr .9fr}.modal-photo{min-height:550px}.modal-photo img{height:100%;object-fit:cover}.modal-copy{padding:50px 40px}.close{position:absolute;right:14px;top:14px;width:42px;height:42px;border:0;background:#0b0b0c;color:#fff;font-size:22px}.modal-copy h2{font-family:Manrope;font-size:44px;line-height:.95;margin:10px 0 16px}.modal-price{font-family:Manrope;font-size:30px;font-weight:800;color:var(--red)}.specs{display:grid;grid-template-columns:1fr 1fr;margin:24px 0;border-top:1px solid #e7e1d8}.spec{padding:14px 0;border-bottom:1px solid #e7e1d8}.spec span{display:block;color:#817b74;font-size:9px;text-transform:uppercase}.spec b{display:block;margin-top:5px;font-size:13px}.cta{display:flex;justify-content:center;align-items:center;min-height:54px;background:var(--red);color:#fff;font-size:11px;font-weight:800;text-transform:uppercase}.float{position:fixed;right:18px;bottom:16px;background:#25d366;color:#07130b;padding:14px 18px;border-radius:999px;font-size:11px;font-weight:800}
    @media(max-width:800px){.grid{grid-template-columns:1fr}.panel{grid-template-columns:1fr}.modal-photo{min-height:280px;max-height:42vh}.modal-copy{padding:35px 25px}}@media(max-width:520px){.top{padding:22px 18px 48px}.brand span{display:none}.intro h1{font-size:55px}.catalog{padding:48px 18px 90px}.head{display:block}.modal{padding:0;align-items:flex-end}}
  </style>
</head>
<body>
  <header class="top"><nav class="nav"><a class="brand" href="./"><img src="assets/logo.jpg" alt="André Moi Veículos"><span>André Moi Veículos</span></a><a class="back" href="./">← Voltar ao site</a></nav><div class="intro"><span class="kicker">Estoque André Moi</span><h1>Escolha seu próximo <span>carro.</span></h1><p>Abra cada veículo para conferir as informações e falar diretamente com a equipe.</p></div></header>
  <main class="catalog"><div class="head"><h2>Veículos em destaque</h2><p>Consulte disponibilidade e condições atuais</p></div><div class="grid" id="grid"></div></main>
  <div class="modal" id="modal" role="dialog" aria-modal="true"><div class="panel"><button class="close" id="close" aria-label="Fechar">×</button><div class="modal-photo"><img id="modalImage" alt=""></div><div class="modal-copy"><span class="kicker" id="modalType"></span><h2 id="modalTitle"></h2><div class="modal-price" id="modalPrice"></div><div class="specs" id="modalSpecs"></div><a class="cta" id="modalCta" target="_blank" rel="noreferrer">Tenho interesse neste veículo</a></div></div></div>
  <a class="float" href="https://wa.me/5517981892458?text=Olá!%20Estou%20vendo%20o%20estoque%20da%20André%20Moi%20Veículos." target="_blank">WhatsApp André Moi</a>
  <script>
    const vehicles=[
      {name:"Volkswagen Nivus Highline",type:"SUV Coupé · Automático",year:"2025/2025",km:"11.110 km",engine:"1.0 Turbo",fuel:"Flex",price:"R$ 134.900",image:"assets/nivus.jpg"},
      {name:"Fiat Toro Ultra",type:"Picape · Diesel · 4x4",year:"2022/2022",km:"Consulte",engine:"2.0 Turbo",fuel:"Diesel",price:"R$ 135.900",image:"assets/toro.jpg"},
      {name:"Fiat Uno Way 1.0",type:"Econômico · Manual",year:"2015/2015",km:"Consulte",engine:"1.0",fuel:"Flex",price:"R$ 44.900",image:"assets/uno.jpg"}
    ];
    const grid=document.getElementById("grid"),modal=document.getElementById("modal"),modalImage=document.getElementById("modalImage"),modalType=document.getElementById("modalType"),modalTitle=document.getElementById("modalTitle"),modalPrice=document.getElementById("modalPrice"),modalSpecs=document.getElementById("modalSpecs"),modalCta=document.getElementById("modalCta"),closeButton=document.getElementById("close");
    grid.innerHTML=vehicles.map((v,i)=>`<button class="car" data-index="${i}"><span class="photo"><img src="${v.image}" alt="${v.name}"><span class="tag">Destaque</span></span><span class="copy"><span class="type">${v.type}</span><h3>${v.name}</h3><span class="facts"><span>${v.year}</span><span>${v.km}</span><span>${v.fuel}</span></span><span class="price">${v.price}</span><span class="more">Ver informações →</span></span></button>`).join("");
    function openVehicle(i){const v=vehicles[i];modal.classList.add("open");document.body.style.overflow="hidden";modalImage.src=v.image;modalImage.alt=v.name;modalType.textContent=v.type;modalTitle.textContent=v.name;modalPrice.textContent=v.price;modalSpecs.innerHTML=[["Ano",v.year],["Quilometragem",v.km],["Motorização",v.engine],["Combustível",v.fuel],["Localização","Barretos/SP"],["Negociação","Compra ou troca"]].map(x=>`<div class="spec"><span>${x[0]}</span><b>${x[1]}</b></div>`).join("");modalCta.href=`https://wa.me/5517981892458?text=${encodeURIComponent(`Olá! Vi o ${v.name} ${v.year} no site e gostaria de saber mais.`)}`}
    function closeModal(){modal.classList.remove("open");document.body.style.overflow=""}grid.addEventListener("click",e=>{const c=e.target.closest(".car");if(c)openVehicle(c.dataset.index)});closeButton.addEventListener("click",closeModal);modal.addEventListener("click",e=>{if(e.target===modal)closeModal()});document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
  </script>
</body>
</html>
